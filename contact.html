<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ｜じぶんマトリクス</title>
<meta name="robots" content="noindex, follow">
<meta name="description" content="じぶんマトリクスへのお問い合わせ方法のご案内です。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Shippori+Mincho:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --ink:#0f0e0c; --paper:#f4ede0; --gold:#b8893a; --gold-light:#d4ad5e; --crimson:#8a2922; }
  body { font-family:'Shippori Mincho',serif; background:var(--paper); color:var(--ink); line-height:1.95; position:relative; }
  body::before { content:''; position:fixed; inset:0; background-image:radial-gradient(rgba(15,14,12,0.025) 1px,transparent 1px); background-size:4px 4px; pointer-events:none; z-index:0; }
  .wrap { position:relative; z-index:1; max-width:680px; margin:0 auto; padding:56px 24px 80px; }
  .eyebrow { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.3em; color:var(--gold); text-transform:uppercase; margin-bottom:14px; }
  h1 { font-size:clamp(24px,5vw,32px); font-weight:800; margin-bottom:8px; }
  .lead { font-size:14px; color:rgba(15,14,12,0.65); margin-bottom:40px; }
  .contact-card {
    border:1px solid rgba(184,137,58,0.4); background:rgba(184,137,58,0.06);
    padding:32px 28px; text-align:center; margin-bottom:32px;
  }
  .contact-label { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.25em; color:var(--gold); text-transform:uppercase; margin-bottom:12px; }
  .contact-mail { font-size:20px; font-weight:700; color:var(--crimson); word-break:break-all; }
  p { font-size:14px; color:rgba(15,14,12,0.82); margin-bottom:12px; }
  .note { font-size:12px; color:rgba(15,14,12,0.55); }
  .back { display:inline-block; margin-top:24px; font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.15em; color:var(--gold); text-decoration:none; border-bottom:1px solid rgba(184,137,58,0.4); padding-bottom:2px; }
  .back:hover { color:var(--crimson); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Contact</div>
    <h1>お問い合わせ</h1>
    <p class="lead">ご質問・ご要望、商品に関するお問い合わせは、以下のメールアドレスまでお願いいたします。</p>

    <div class="contact-card">
      <div class="contact-label">Email</div>
      <div class="contact-mail">jbnmatrix@gmail.com</div>
    </div>

    <p>商品（プレミアム解説書）のダウンロードに関するお問い合わせの際は、購入時の決済メールに記載の情報を添えていただくと、スムーズに対応できます。</p>
    <p class="note">お問い合わせの内容によっては、返信までお時間をいただく場合があります。あらかじめご了承ください。</p>

    <a class="back" href="https://www.jibunmatrix.com/">← じぶんマトリクスへ戻る</a>
  </div>
</body>
</html>
